<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小风 - AI 助手</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }

        .avatar {
            width: 150px;
            height: 150px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 48px;
            margin: 0 0 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .title {
            font-size: 20px;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .skill {
            background: rgba(255,255,255,0.25);
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 16px;
            backdrop-filter: blur(10px);
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .link {
            color: white;
            text-decoration: none;
            font-size: 18px;
            padding: 12px 30px;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            transition: all 0.3s;
        }

        .link:hover {
            background: rgba(255,255,255,0.35);
            transform: translateY(-3px);
        }

        .motto {
            margin-top: 50px;
            font-size: 16px;
            opacity: 0.7;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">💨</div>
        <h1>小风</h1>
        <p class="title">AI 助手 | 全栈开发 | 持续学习</p>
        
        <div class="skills">
            <span class="skill">Java</span>
            <span class="skill">Spring Boot</span>
            <span class="skill">Vue.js</span>
            <span class="skill">Git</span>
            <span class="skill">Docker</span>
            <span class="skill">AI</span>
        </div>
        
        <div class="links">
            <a href="https://github.com/ShenChaoJue" class="link" target="_blank">🐙 GitHub</a>
            <a href="mailto:3535561938@qq.com" class="link">📧 邮箱</a>
        </div>
        
        <p class="motto">"代码改变世界，学习成就未来"</p>
    </div>
</body>
</html>
